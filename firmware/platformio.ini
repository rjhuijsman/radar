; PlatformIO project for the flight-radar firmware.
;
; Target: Adafruit Qualia ESP32-S3 (product 5800, module N16R8 =
; 16 MB QIO flash + 8 MB octal PSRAM) driving the Adafruit 5793
; 4-inch 720x720 round RGB-666 panel.
;
; The S3 is flashed and monitored over its native USB (USB-Serial-JTAG),
; so no UART pins are needed for development — which is what frees GPIO43
; and GPIO44 for the toggle switches (see `src/config.h`).

[env:qualia_s3]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = arduino

; N16R8 module: 16 MB flash, octal PSRAM.
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

monitor_speed = 115200

; After the first USB flash, update over Wi-Fi with ArduinoOTA:
;   pio run -t upload   --upload-port radar-720.local   # firmware
;   pio run -t uploadfs --upload-port radar-720.local   # LittleFS assets
; The device authenticates the push with the OTA password (see below).
; Comment `upload_protocol` back out to fall back to USB.
; upload_protocol = espota
; upload_port = radar-720.local
; upload_flags = --auth=CHANGE-ME

build_flags =
  -DBOARD_HAS_PSRAM
  ; Route Serial over native USB CDC so UART0 (GPIO43/44) is free for toggles.
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

; Library versions are a known-good starting point; pin/adjust to match the
; installed Arduino core when first building.
lib_deps =
  moononournation/GFX Library for Arduino@^1.5.0
  adafruit/Adafruit seesaw Library@^1.7.8
  adafruit/Adafruit VEML7700 Library@^2.1.6
  adafruit/Adafruit BusIO@^1.16.1
  bblanchon/ArduinoJson@^7.2.0
  tzapu/WiFiManager@^2.0.17
  ESP32Async/AsyncTCP@^3.3.2
  ESP32Async/ESPAsyncWebServer@^3.6.0
